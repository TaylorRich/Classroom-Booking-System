<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classroom Booking — Central University</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-decor"></div>

  <div class="login-left">
    <div class="login-left-logo">CU</div>
    <div class="login-left-title">Classroom Booking System</div>
    <p class="login-left-subtitle">
      Reserve and manage learning spaces across all Central University
      campuses — fast, fair, and fully transparent.
    </p>
    <p class="login-tagline">Faith · Integrity · Excellence</p>
  </div>

  <div class="login-right">
    <h2 class="login-form-title">Welcome Back</h2>
    <p class="login-form-sub">Sign in to your account to continue</p>

    <div id="loginAlert" class="alert alert-error" style="display:none;"></div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Enter your username" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Enter your password" required />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="eyeOffIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="login-btn" type="submit" id="loginBtn">Sign In</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
<script>
  LoginPage.init();
</script>
</body>
</html>
