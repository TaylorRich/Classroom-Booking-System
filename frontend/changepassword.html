<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password — Classroom Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-decor"></div>

  <div class="login-left">
    <div class="login-left-logo">CU</div>
    <div class="login-left-title">Classroom Booking System</div>
    <p class="login-left-subtitle">
      Reserve and manage learning spaces across all Central University
      campuses — fast, fair, and fully transparent.
    </p>
    <p class="login-tagline">Faith · Integrity · Excellence</p>
  </div>

  <div class="login-right">
    <h2 class="login-form-title">Set Your Password</h2>
    <p class="login-form-sub">You're using a default password. Please set a new one before continuing.</p>

    <div id="cpAlert" class="alert" style="display:none;"></div>

    <form id="cpForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="currentPassword">Current Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="currentPassword" placeholder="Enter rep123" required />
          <button type="button" class="pw-toggle" data-target="currentPassword" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="newPassword">New Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="newPassword" placeholder="At least 6 characters" required />
          <button type="button" class="pw-toggle" data-target="newPassword" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm New Password</label>
        <div class="password-wrap">
          <input class="form-input" type="password" id="confirmPassword" placeholder="Repeat new password" required />
          <button type="button" class="pw-toggle" data-target="confirmPassword" aria-label="Show password">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="login-btn" type="submit" id="cpBtn">Set Password & Continue</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
<script>
  ChangePasswordPage.init();
</script>
</body>
</html>
